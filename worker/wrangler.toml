name = "baby-list-sync"
main = "baby-list-worker.js"
compatibility_date = "2026-07-01"

[durable_objects]
bindings = [
  { name = "FAMILY", class_name = "FamilyList" }
]

[[migrations]]
tag = "v3-durable-state"
new_sqlite_classes = ["FamilyList"]

# Set these as secrets/variables before deployment:
#   wrangler secret put TOKEN
#   wrangler secret put PUSH_TOKEN
#   wrangler secret put ALLOWED_ORIGINS
# ALLOWED_ORIGINS is a comma-separated list, for example:
# https://your-name.github.io,https://baby.example.com
